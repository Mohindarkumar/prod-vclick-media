<!doctype html>
<html lang="en-AE">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO (also managed dynamically via SEOHead.jsx per-route) -->
    <title>VClick Media & Events | Premium Photography, Videography & Event Management in Ajman, UAE</title>
    <meta name="description" content="VClick Media & Events delivers cinematic photography, videography and full-service event production for corporate clients, weddings, exhibitions and brand activations across the UAE. Based in Ajman Free Zone." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#0B0B0B" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="AE" />
    <meta name="geo.placename" content="Ajman, United Arab Emirates" />
    <meta name="geo.position" content="25.4052;55.5136" />
    <meta name="ICBM" content="25.4052, 55.5136" />

    <!-- Canonical (SPA — overridden per-route by SEOHead) -->
    <link rel="canonical" href="https://www.vclickmedia.ae/" />

    <!-- Open Graph fallback (overridden per-route by SEOHead) -->
    <meta property="og:site_name" content="VClick Media & Events" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.vclickmedia.ae/" />
    <meta property="og:locale" content="en_AE" />
    <meta property="og:image" content="https://www.vclickmedia.ae/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@vclickmedia" />

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Preconnect for external image/video assets -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />
  </head>
  <body class="bg-ink text-paper antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
